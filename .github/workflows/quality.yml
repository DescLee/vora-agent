name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests evals
      - name: Type check
        run: mypy
      - name: Tests and coverage
        run: pytest --cov=manus_mini --cov-report=term-missing --cov-report=xml
      - name: Agent evals
        run: python evals/run_evals.py --json-report eval-report.json --markdown-report eval-report.md
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            coverage.xml
            eval-report.json
            eval-report.md
